services:
  cassandra:
    image: cassandra:5.0
    container_name: cassandra
    ports:
      - "9043:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=financial_dw_cluster
      - CASSANDRA_DC=datacenter1
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -qE '^UN'"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 90s
    volumes:
      - cassandra_data:/var/lib/cassandra

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  app:
    build: .
    container_name: dw_app
    ports:
      - "8080:8000"
    env_file:
      - .env
    environment:
      - CASSANDRA_HOSTS=cassandra
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./app/static:/app/app/static
    depends_on:
      cassandra:
        condition: service_healthy
      ollama:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build: .
    container_name: dw_worker
    command: python -m app.worker.worker
    env_file:
      - .env
    environment:
      - CASSANDRA_HOSTS=cassandra
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      cassandra:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  cassandra_data:
  ollama_data: